name: Release

# Builds a DMG and attaches it to a GitHub Release whenever a version tag
# (e.g. v0.1.0) is pushed. Can also be run manually to produce a test DMG
# without publishing a release.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to stamp the build with (e.g. 0.1.0)."
        required: false

permissions:
  contents: write

jobs:
  build:
    # macOS 26 image: Nook targets macOS 26, so it needs Xcode 26's SDK.
    runs-on: macos-26

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select latest stable Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Resolve version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION="${{ github.event.inputs.version }}"
          fi
          [ -z "$VERSION" ] && VERSION="0.0.0-dev"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Building Nook $VERSION"

      - name: Archive app (ad-hoc signed)
        run: |
          xcodebuild archive \
            -project Nook.xcodeproj \
            -scheme Nook \
            -configuration Release \
            -destination 'generic/platform=macOS' \
            -archivePath "$RUNNER_TEMP/Nook.xcarchive" \
            MARKETING_VERSION="${{ steps.version.outputs.version }}" \
            CURRENT_PROJECT_VERSION="${{ github.run_number }}" \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="-" \
            DEVELOPMENT_TEAM="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=YES \
            ENABLE_HARDENED_RUNTIME=NO

      - name: Create DMG
        id: dmg
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          APP="$RUNNER_TEMP/Nook.xcarchive/Products/Applications/Nook.app"
          ICNS="$APP/Contents/Resources/AppIcon.icns"
          VOL="Nook ${VERSION}"
          STAGING="$RUNNER_TEMP/dmg-staging"
          RW="$RUNNER_TEMP/Nook-rw.dmg"
          DMG="Nook-${VERSION}.dmg"
          SETFILE="$(xcrun --find SetFile)"

          rm -rf "$STAGING" "$RW" "$DMG"
          mkdir -p "$STAGING"
          cp -R "$APP" "$STAGING/"
          # Classic "drag to Applications" layout.
          ln -s /Applications "$STAGING/Applications"
          # Volume icon (shown for the mounted disk) uses the app icon.
          cp "$ICNS" "$STAGING/.VolumeIcon.icns"

          # Build a read-write image we can style in Finder, then compress it.
          hdiutil create -volname "$VOL" -srcfolder "$STAGING" -fs HFS+ -format UDRW -ov "$RW"
          MP="$(hdiutil attach "$RW" -nobrowse -noautoopen | grep -o '/Volumes/.*' | head -1)"
          VOLNAME="$(basename "$MP")"

          # Mark the volume as having a custom icon (picks up .VolumeIcon.icns).
          "$SETFILE" -a C "$MP"

          # Window layout: icon view, hidden chrome, app on the left dragging
          # onto the Applications shortcut on the right. Best-effort — a Finder
          # hiccup on the runner must not fail the release (icons still apply).
          osascript <<OSA || echo "::warning::Finder DMG layout failed; shipping default window"
          tell application "Finder"
            tell disk "$VOLNAME"
              open
              set current view of container window to icon view
              set toolbar visible of container window to false
              set statusbar visible of container window to false
              set the bounds of container window to {200, 120, 720, 480}
              set vo to the icon view options of container window
              set arrangement of vo to not arranged
              set icon size of vo to 104
              set position of item "Nook.app" of container window to {140, 190}
              set position of item "Applications" of container window to {380, 190}
              update without registering applications
              delay 1
              close
            end tell
          end tell
          OSA

          sync
          hdiutil detach "$MP"
          hdiutil convert "$RW" -format UDZO -o "$DMG"

          # Give the .dmg file itself the app icon in Finder.
          osascript - "$ICNS" "$DMG" <<'OSA' || echo "::warning::Setting .dmg file icon failed"
          use framework "AppKit"
          on run argv
            set img to (current application's NSImage's alloc()'s initWithContentsOfFile:(item 1 of argv))
            (current application's NSWorkspace's sharedWorkspace()'s setIcon:img forFile:(item 2 of argv) options:0)
          end run
          OSA

          echo "path=$DMG" >> "$GITHUB_OUTPUT"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: Nook-dmg
          path: ${{ steps.dmg.outputs.path }}
          if-no-files-found: error

      - name: Publish GitHub Release
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.dmg.outputs.path }}
          generate_release_notes: true
          body: |
            ## Install

            1. Download `Nook-${{ steps.version.outputs.version }}.dmg` below.
            2. Open it and drag **Nook** into **Applications**.
            3. On first launch, macOS Gatekeeper will warn that the app is from
               an unidentified developer (this build is ad-hoc signed, not
               notarized). To open it:
               - **Right-click** `Nook.app` → **Open** → **Open**, or
               - run once in Terminal:
                 ```sh
                 xattr -dr com.apple.quarantine /Applications/Nook.app
                 ```

            Requires macOS 26 or later.

      # --- Sparkle auto-update: sign the DMG and publish an appcast ---
      # Requires repo secret SPARKLE_PRIVATE_KEY (from Sparkle's generate_keys)
      # and GitHub Pages served from the gh-pages branch. The app's Info.plist
      # SUFeedURL must point at <owner>.github.io/<repo>/appcast.xml.
      - name: Sign update and build appcast
        if: github.event_name == 'push'
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
          VERSION: ${{ steps.version.outputs.version }}
          BUILD: ${{ github.run_number }}
          REPO: ${{ github.repository }}
          DMG_PATH: ${{ steps.dmg.outputs.path }}
        run: |
          set -euo pipefail
          if [ -z "${SPARKLE_PRIVATE_KEY:-}" ]; then
            echo "SPARKLE_PRIVATE_KEY secret not set — skipping appcast."
            echo "skip_appcast=true" >> "$GITHUB_ENV"
            exit 0
          fi

          SPARKLE_VER=2.9.4
          curl -fsSL "https://github.com/sparkle-project/Sparkle/releases/download/${SPARKLE_VER}/Sparkle-${SPARKLE_VER}.tar.xz" -o "$RUNNER_TEMP/sparkle.tar.xz"
          mkdir -p "$RUNNER_TEMP/sparkle"
          tar -xf "$RUNNER_TEMP/sparkle.tar.xz" -C "$RUNNER_TEMP/sparkle"

          # sign_update prints: sparkle:edSignature="..." length="..."
          # The private key is passed via a file (-s is removed in Sparkle 2.9+).
          printf '%s' "$SPARKLE_PRIVATE_KEY" > "$RUNNER_TEMP/sparkle_ed_key"
          SIGN_OUT="$("$RUNNER_TEMP/sparkle/bin/sign_update" --ed-key-file "$RUNNER_TEMP/sparkle_ed_key" "$DMG_PATH")"
          rm -f "$RUNNER_TEMP/sparkle_ed_key"
          echo "sign_update: $SIGN_OUT"
          ED_SIG="$(printf '%s' "$SIGN_OUT" | sed -n 's/.*edSignature="\([^"]*\)".*/\1/p')"
          ED_LEN="$(printf '%s' "$SIGN_OUT" | sed -n 's/.*length="\([^"]*\)".*/\1/p')"

          FEED_URL="https://raw.githubusercontent.com/${REPO}/gh-pages/appcast.xml"

          mkdir -p public
          # Fetch the existing appcast so release history is preserved.
          curl -fsSL "$FEED_URL" -o public/appcast.xml || echo "No existing appcast; creating a new one."

          BUILD="$BUILD" VERSION="$VERSION" ED_SIG="$ED_SIG" ED_LEN="$ED_LEN" \
          REPO="$REPO" DMG_NAME="$(basename "$DMG_PATH")" PAGES_URL="$FEED_URL" \
          PUBDATE="$(LC_ALL=C date -u '+%a, %d %b %Y %H:%M:%S +0000')" \
          python3 - <<'PY'
          import os, re

          build   = os.environ["BUILD"]
          version = os.environ["VERSION"]
          sig     = os.environ["ED_SIG"]
          length  = os.environ["ED_LEN"]
          repo    = os.environ["REPO"]
          dmg     = os.environ["DMG_NAME"]
          pubdate = os.environ["PUBDATE"]
          pages   = os.environ["PAGES_URL"]
          path    = "public/appcast.xml"

          dmg_url   = f"https://github.com/{repo}/releases/download/v{version}/{dmg}"
          notes_url = f"https://github.com/{repo}/releases/tag/v{version}"

          item = (
              "    <item>\n"
              f"      <title>Version {version}</title>\n"
              f"      <sparkle:version>{build}</sparkle:version>\n"
              f"      <sparkle:shortVersionString>{version}</sparkle:shortVersionString>\n"
              "      <sparkle:minimumSystemVersion>26.0</sparkle:minimumSystemVersion>\n"
              f"      <sparkle:releaseNotesLink>{notes_url}</sparkle:releaseNotesLink>\n"
              f"      <pubDate>{pubdate}</pubDate>\n"
              f'      <enclosure url="{dmg_url}" sparkle:edSignature="{sig}" length="{length}" type="application/octet-stream"/>\n'
              "    </item>\n"
          )

          content = None
          if os.path.exists(path):
              with open(path, encoding="utf-8") as f:
                  content = f.read()

          if content and "<item>" in content:
              # Drop any existing item with the same build so re-runs stay idempotent.
              content = re.sub(
                  r"[ \t]*<item>(?:(?!</item>).)*?<sparkle:version>%s</sparkle:version>.*?</item>\n?" % re.escape(build),
                  "", content, flags=re.S,
              )
              idx = content.find("<item>")
              line_start = content.rfind("\n", 0, idx) + 1
              content = content[:line_start] + item + content[line_start:]
          else:
              content = (
                  '<?xml version="1.0" encoding="utf-8"?>\n'
                  '<rss version="2.0" xmlns:sparkle="http://www.andymatuschak.org/xml-namespaces/sparkle" xmlns:dc="http://purl.org/dc/elements/1.1/">\n'
                  "  <channel>\n"
                  "    <title>Nook</title>\n"
                  f"    <link>{pages}</link>\n"
                  "    <description>Nook software updates</description>\n"
                  "    <language>en</language>\n"
                  f"{item}"
                  "  </channel>\n"
                  "</rss>\n"
              )

          with open(path, "w", encoding="utf-8") as f:
              f.write(content)
          print(content)
          PY

      - name: Publish appcast to GitHub Pages
        if: github.event_name == 'push' && env.skip_appcast != 'true'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          keep_files: true
